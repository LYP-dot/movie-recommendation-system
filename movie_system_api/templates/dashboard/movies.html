{% extends "layout.html" %}

{% block title %}电影管理 - 电影信息系统{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2"><i class="fas fa-video me-2"></i>电影管理</h1>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addMovieModal">
        <i class="fas fa-plus me-1"></i>添加电影
    </button>
</div>

<!-- 搜索和筛选 -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row">
            <div class="col-md-4">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索电影名称、导演...">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="yearFilter">
                    <option value="">全部年份</option>
                    <!-- 年份选项将通过JavaScript动态生成 -->
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="genreFilter">
                    <option value="">全部类型</option>
                    <!-- 类型选项将通过JavaScript动态生成 -->
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary w-100" id="resetFilters">
                    <i class="fas fa-redo"></i> 重置
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 电影列表 -->
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0">电影列表</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover" id="moviesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>电影名称</th>
                        <th>上映年份</th>
                        <th>语言</th>
                        <th>时长</th>
                        <th>导演</th>
                        <th>类型</th>
                        <th>评分</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="moviesTableBody">
                    <!-- 电影数据将通过JavaScript动态加载 -->
                    <tr>
                        <td colspan="9" class="text-center py-4">
                            <div class="loading"></div>
                            <p class="mt-2 text-muted">加载电影数据...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <nav aria-label="电影分页">
            <ul class="pagination" id="pagination">
                <!-- 分页将通过JavaScript动态生成 -->
            </ul>
        </nav>
    </div>
</div>

<!-- 添加电影模态框 -->
<div class="modal fade" id="addMovieModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">添加新电影</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addMovieForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="title" class="form-label">电影名称 *</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="release_year" class="form-label">上映年份</label>
                            <input type="number" class="form-control" id="release_year" name="release_year" min="1900" max="2030">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="language" class="form-label">语言</label>
                            <input type="text" class="form-control" id="language" name="language">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="duration" class="form-label">时长（分钟）</label>
                            <input type="number" class="form-control" id="duration" name="duration" min="1">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="director" class="form-label">导演</label>
                        <input type="text" class="form-control" id="director" name="director">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">简介</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">电影类型</label>
                        <div id="genresCheckboxGroup">
                            <!-- 类型复选框将通过JavaScript动态生成 -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveMovieBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑电影模态框 -->
<div class="modal fade" id="editMovieModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑电影信息</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editMovieForm">
                    <input type="hidden" id="edit_movie_id" name="movie_id">
                    <!-- 编辑表单内容与添加表单类似 -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="edit_title" class="form-label">电影名称 *</label>
                            <input type="text" class="form-control" id="edit_title" name="title" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="edit_release_year" class="form-label">上映年份</label>
                            <input type="number" class="form-control" id="edit_release_year" name="release_year" min="1900" max="2030">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="edit_language" class="form-label">语言</label>
                            <input type="text" class="form-control" id="edit_language" name="language">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="edit_duration" class="form-label">时长（分钟）</label>
                            <input type="number" class="form-control" id="edit_duration" name="duration" min="1">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="edit_director" class="form-label">导演</label>
                        <input type="text" class="form-control" id="edit_director" name="director">
                    </div>
                    <div class="mb-3">
                        <label for="edit_description" class="form-label">简介</label>
                        <textarea class="form-control" id="edit_description" name="description" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">电影类型</label>
                        <div id="editGenresCheckboxGroup">
                            <!-- 类型复选框将通过JavaScript动态生成 -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="updateMovieBtn">更新</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script>
    // 电影管理特定的JavaScript代码
    document.addEventListener('DOMContentLoaded', function() {
        loadMovies();
        loadGenresForFilter();
        loadYearsForFilter();

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', debounce(loadMovies, 500));
        document.getElementById('yearFilter').addEventListener('change', loadMovies);
        document.getElementById('genreFilter').addEventListener('change', loadMovies);
        document.getElementById('resetFilters').addEventListener('click', resetFilters);

        // 添加电影功能
        document.getElementById('saveMovieBtn').addEventListener('click', saveMovie);
        document.getElementById('updateMovieBtn').addEventListener('click', updateMovie);
    });

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('yearFilter').value = '';
        document.getElementById('genreFilter').value = '';
        loadMovies();
    }
</script>
{% endblock %}
