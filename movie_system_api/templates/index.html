<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 电影信息系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card modern-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-star"></i>
                </div>
                <h2>欢迎来到影视世界</h2>
                <p class="mb-0">登录到电影信息系统</p>
            </div>

            <div class="login-body">
                <form id="loginForm">
                    <div class="mb-4">
                        <label for="username" class="form-label">用户名</label>
                        <div class="modern-search">

                            <input type="text" class="form-control" id="username" name="username" required
                                   placeholder="请输入用户名">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">密码</label>
                        <div class="modern-search">

                            <input type="password" class="form-control" id="password" name="password" required
                                   placeholder="请输入密码">
                        </div>
                    </div>

                    <button type="submit" class="btn gradient-btn w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i> 登录
                    </button>

                    <div class="text-center">
                        <p class="text-muted">没有账户？
                            <a href="{{ url_for('register_page') }}" class="text-decoration-none fw-bold"
                               style="color: #667eea;">立即注册</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
