<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 电影信息系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card modern-card" style="max-width: 500px;">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2>创建账户</h2>
                <p class="mb-0">加入我们的电影社区</p>
            </div>

            <div class="login-body">
                <!-- 添加错误显示区域 -->
                <div id="error-message" class="alert alert-danger d-none"></div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名 *</label>
                        <div class="modern-search">
                            <i class="fas fa-user"></i>
                            <input type="text" class="form-control" id="username" name="username" required
                                   minlength="3" placeholder="至少3个字符">
                        </div>
                        <div class="form-text ms-3">用户名至少3个字符</div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">密码 *</label>
                        <div class="modern-search">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-control" id="password" name="password" required
                                   minlength="6" placeholder="至少6个字符">
                        </div>
                        <div class="form-text ms-3">密码至少6个字符</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">确认密码 *</label>
                        <div class="modern-search">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                   required placeholder="再次输入密码">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="nickname" class="form-label">昵称</label>
                        <div class="modern-search">
                            <i class="fas fa-signature"></i>
                            <input type="text" class="form-control" id="nickname" name="nickname"
                                   placeholder="可选填">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="age" class="form-label">年龄</label>
                            <div class="modern-search">
                                <i class="fas fa-birthday-cake"></i>
                                <input type="number" class="form-control" id="age" name="age" min="1" max="120"
                                       placeholder="可选填">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="gender" class="form-label">性别</label>
                            <select class="form-select modern-select" id="gender" name="gender">
                                <option value="">请选择</option>
                                <option value="M">男</option>
                                <option value="F">女</option>
                                <option value="O">其他</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn gradient-btn w-100 mb-3">
                        <i class="fas fa-user-plus me-2"></i> 注册
                    </button>

                    <div class="text-center">
                        <p class="text-muted">已有账户？
                            <a href="{{ url_for('login_page') }}" class="text-decoration-none fw-bold"
                               style="color: #667eea;">立即登录</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
