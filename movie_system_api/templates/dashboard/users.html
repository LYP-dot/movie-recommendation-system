{% extends "layout.html" %}

{% block title %}用户管理 - 电影信息系统{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
<style>
/* 用户列表棕色系样式 */
.user-list-card {
    background:
        linear-gradient(135deg,
            rgba(251, 248, 243, 0.8) 0%,
            rgba(245, 241, 235, 0.8) 50%,
            rgba(240, 235, 226, 0.8) 100%) !important;
    border: 1px solid rgba(139, 115, 85, 0.2) !important;
    border-radius: 15px !important;
    box-shadow:
        0 10px 30px rgba(139, 115, 85, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.8) !important;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
}

/* 使用伪元素添加背景图并单独控制透明度 */
.user-list-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('{{ url_for("static", filename="images/stats-users.jpg") }}');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.3; /* 单独控制背景图透明度 */
    z-index: 0;
}

/* 确保内容在背景之上 */
.user-list-card .card-header,
.user-list-card .card-body {
    position: relative;
    z-index: 1;
}

.user-list-card .card-header {
    background: linear-gradient(135deg,
        rgba(139, 115, 85, 0.1) 0%,
        rgba(105, 105, 105, 0.05) 100%) !important;
    border-bottom: 1px solid rgba(139, 115, 85, 0.15) !important;
}

.user-list-card .card-title {
    color: #5D4037 !important; /* 深棕色 */
}

.user-list-badge {
    background: linear-gradient(135deg, #8B7355 0%, #5D4037 100%) !important;
    color: white !important;
}

/* 确保有棕色系变量 */
:root {
    --primary-brown: #8B7355;
    --dark-brown: #5D4037;
}

.gradient-btn-brown {
    background: linear-gradient(135deg, var(--primary-brown) 0%, var(--dark-brown) 100%);
    border: none;
    color: white;
    border-radius: 8px;
    padding: 10px 20px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.gradient-btn-brown:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(139, 115, 85, 0.3);
    color: white;
}

/* 表格行背景调整以确保可读性 */
.user-list-card .table tbody tr {
    background: rgba(255, 255, 255, 0.7);
}

.user-list-card .table tbody tr:nth-child(even) {
    background: rgba(255, 255, 255, 0.9);
}

.user-list-card .table tbody tr:hover {
    background: rgba(255, 255, 255, 0.95);
}

.card.mb-4 .card-body {
    position: relative;
    z-index: 1;
}

.user-list-card .card-header {
    background: linear-gradient(135deg,
        rgba(139, 115, 85, 0.1) 0%,
        rgba(105, 105, 105, 0.05) 100%) !important;
    border-bottom: 1px solid rgba(139, 115, 85, 0.15) !important;
}

.user-list-card .card-title {
    color: #5D4037 !important; /* 深棕色 */
}

.user-list-badge {
    background: linear-gradient(135deg, #8B7355 0%, #5D4037 100%) !important;
    color: white !important;
}

/* 确保有棕色系变量 */
:root {
    --primary-brown: #8B7355;
    --dark-brown: #5D4037;
}
.gradient-btn-brown {
    background: linear-gradient(135deg, var(--primary-brown) 0%, var(--dark-brown) 100%);
    border: none;
    color: white;
    border-radius: 8px;
    padding: 10px 20px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.gradient-btn-brown:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(139, 115, 85, 0.3);
    color: white;
}

</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2"><i class="fas fa-users me-2"></i>用户管理</h1>
    <button class="btn gradient-btn-brown" data-bs-toggle="modal" data-bs-target="#addUserModal">
        <i class="fas fa-plus me-1"></i>添加用户
    </button>
</div>

<!-- 搜索和筛选 -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row">
            <div class="col-md-4">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索用户名、昵称...">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="genderFilter">
                    <option value="">全部性别</option>
                    <option value="M">男</option>
                    <option value="F">女</option>
                    <option value="O">其他</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="favoriteGenreFilter">
                    <option value="">偏好类型</option>
                    <!-- 类型选项将通过JavaScript动态生成 -->
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary w-100" id="resetFilters">
                    <i class="fas fa-redo"></i> 重置
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 用户列表 -->
<div class="card user-list-card">
    <div class="card-header">
        <h5 class="card-title mb-0">用户列表</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover" id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>昵称</th>
                        <th>年龄</th>
                        <th>性别</th>
                        <th>偏好类型</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="8" class="text-center py-4">
                            <div class="loading"></div>
                            <p class="mt-2 text-muted">加载用户数据...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <nav aria-label="用户分页">
            <ul class="pagination" id="pagination">
                <!-- 分页将通过JavaScript动态生成 -->
            </ul>
        </nav>
    </div>
</div>

<!-- 添加用户模态框 -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">添加新用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addUserForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名 *</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码 *</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="nickname" class="form-label">昵称</label>
                        <input type="text" class="form-control" id="nickname" name="nickname">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="age" class="form-label">年龄</label>
                            <input type="number" class="form-control" id="age" name="age" min="1" max="120">
                        </div>
                        <div class="col-md-6">
                            <label for="gender" class="form-label">性别</label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="">请选择</option>
                                <option value="M">男</option>
                                <option value="F">女</option>
                                <option value="O">其他</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="favorite_genre_id" class="form-label">偏好类型</label>
                        <select class="form-select" id="favorite_genre_id" name="favorite_genre_id">
                            <option value="">请选择</option>
                            <!-- 类型选项将通过JavaScript动态生成 -->
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveUserBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑用户模态框 -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑用户信息</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editUserForm">
                    <input type="hidden" id="edit_user_id" name="user_id">
                    <div class="mb-3">
                        <label for="edit_username" class="form-label">用户名 *</label>
                        <input type="text" class="form-control" id="edit_username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="edit_password" class="form-label">密码（留空不修改）</label>
                        <input type="password" class="form-control" id="edit_password" name="password">
                    </div>
                    <div class="mb-3">
                        <label for="edit_nickname" class="form-label">昵称</label>
                        <input type="text" class="form-control" id="edit_nickname" name="nickname">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="edit_age" class="form-label">年龄</label>
                            <input type="number" class="form-control" id="edit_age" name="age" min="1" max="120">
                        </div>
                        <div class="col-md-6">
                            <label for="edit_gender" class="form-label">性别</label>
                            <select class="form-select" id="edit_gender" name="gender">
                                <option value="">请选择</option>
                                <option value="M">男</option>
                                <option value="F">女</option>
                                <option value="O">其他</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="edit_favorite_genre_id" class="form-label">偏好类型</label>
                        <select class="form-select" id="edit_favorite_genre_id" name="favorite_genre_id">
                            <option value="">请选择</option>
                            <!-- 类型选项将通过JavaScript动态生成 -->
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="updateUserBtn">更新</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script>
// 用户管理专用变量和函数 - 使用立即执行函数避免变量冲突
(function() {
    // 用户管理专用变量 - 使用局部作用域避免冲突
    const usersItemsPerPage = 10;
    let usersCurrentPage = 1;

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
        console.log('用户管理页面加载完成，开始初始化...');
        loadUsers();
        loadGenresForFilter();
        loadGenresForModal();

        // 搜索和筛选事件监听
        document.getElementById('searchInput').addEventListener('input', debounce(loadUsers, 500));
        document.getElementById('genderFilter').addEventListener('change', loadUsers);
        document.getElementById('favoriteGenreFilter').addEventListener('change', loadUsers);
        document.getElementById('resetFilters').addEventListener('click', resetFilters);

        // 添加用户功能
        document.getElementById('saveUserBtn').addEventListener('click', saveUser);
        document.getElementById('updateUserBtn').addEventListener('click', updateUser);
    });

    // 重置筛选条件
    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('genderFilter').value = '';
        document.getElementById('favoriteGenreFilter').value = '';
        usersCurrentPage = 1;
        loadUsers();
    }

    // 获取性别文本显示
    function getGenderText(gender) {
        const genderMap = {
            'M': '男',
            'F': '女',
            'O': '其他'
        };
        return gender ? genderMap[gender] : '-';
    }

    // 格式化时间显示
    function formatTime(timestamp) {
        if (!timestamp) return '-';
        const date = new Date(timestamp);
        return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
    }

    // 渲染分页
    function renderPagination(totalItems, page, type) {
        const totalPages = Math.ceil(totalItems / usersItemsPerPage);
        const pagination = document.getElementById('pagination');

        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';

        // 上一页
        if (page > 1) {
            html += `<li class="page-item"><a class="page-link" href="#" onclick="window.userManagement.changePage(${page - 1}, '${type}'); return false;">上一页</a></li>`;
        } else {
            html += `<li class="page-item disabled"><a class="page-link" href="#">上一页</a></li>`;
        }

        // 页码 - 显示当前页前后各2页
        const startPage = Math.max(1, page - 2);
        const endPage = Math.min(totalPages, page + 2);

        for (let i = startPage; i <= endPage; i++) {
            if (i === page) {
                html += `<li class="page-item active"><a class="page-link" href="#">${i}</a></li>`;
            } else {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="window.userManagement.changePage(${i}, '${type}'); return false;">${i}</a></li>`;
            }
        }

        // 下一页
        if (page < totalPages) {
            html += `<li class="page-item"><a class="page-link" href="#" onclick="window.userManagement.changePage(${page + 1}, '${type}'); return false;">下一页</a></li>`;
        } else {
            html += `<li class="page-item disabled"><a class="page-link" href="#">下一页</a></li>`;
        }

        pagination.innerHTML = html;
    }

    // 切换页面
    function changePage(page, type) {
        usersCurrentPage = page;
        if (type === 'users') {
            loadUsers(page);
        }
    }

    // 加载用户数据
    async function loadUsers(page = 1) {
        try {
            const search = document.getElementById('searchInput').value;
            const gender = document.getElementById('genderFilter').value;
            const favoriteGenre = document.getElementById('favoriteGenreFilter').value;

            let url = `/api/users?page=${page}&limit=${usersItemsPerPage}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (gender) url += `&gender=${gender}`;
            if (favoriteGenre) url += `&favorite_genre=${favoriteGenre}`;

            console.log('正在加载用户数据，URL:', url);

            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP错误! 状态码: ${response.status}`);
            }

            const data = await response.json();

            console.log('用户数据响应:', data);

            const tbody = document.getElementById('usersTableBody');

            if (data.users && data.users.length > 0) {
                tbody.innerHTML = data.users.map(user => `
                    <tr>
                        <td>${user.user_id}</td>
                        <td>${escapeHtml(user.username)}</td>
                        <td>${user.nickname ? escapeHtml(user.nickname) : '-'}</td>
                        <td>${user.age || '-'}</td>
                        <td>${getGenderText(user.gender)}</td>
                        <td>${user.favorite_genre_name ? `<span class="badge bg-secondary">${escapeHtml(user.favorite_genre_name)}</span>` : '-'}</td>
                        <td>${formatTime(user.register_date)}</td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-primary" onclick="window.userManagement.editUser(${user.user_id})" title="编辑">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-outline-danger" onclick="window.userManagement.deleteUser(${user.user_id})" title="删除">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');

                renderPagination(data.total, page, 'users');
            } else {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center py-4 text-muted">
                            <i class="fas fa-users fa-2x mb-3 d-block"></i>
                            ${search || gender || favoriteGenre ? '没有找到匹配的用户' : '暂无用户数据'}
                        </td>
                    </tr>
                `;
                // 清空分页
                document.getElementById('pagination').innerHTML = '';
            }
        } catch (error) {
            console.error('加载用户失败:', error);
            showAlert('加载用户数据失败: ' + error.message, 'danger');

            // 显示错误状态
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center py-4 text-danger">
                        <i class="fas fa-exclamation-triangle fa-2x mb-3 d-block"></i>
                        加载用户数据失败
                        <br><small>${error.message}</small>
                    </td>
                </tr>
            `;
            // 清空分页
            document.getElementById('pagination').innerHTML = '';
        }
    }

    // 添加 HTML 转义函数以防止 XSS
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 加载类型筛选选项
    async function loadGenresForFilter() {
        try {
            const response = await fetch('/api/genres');
            const data = await response.json();

            const select = document.getElementById('favoriteGenreFilter');

            if (response.ok && data.genres) {
                select.innerHTML = '<option value="">全部类型</option>' +
                    data.genres.map(genre => `
                        <option value="${genre.genre_id}">${genre.genre_name}</option>
                    `).join('');
            }
        } catch (error) {
            console.error('加载类型选项失败:', error);
        }
    }

    // 加载类型模态框选项
    async function loadGenresForModal() {
        try {
            const response = await fetch('/api/genres');
            const data = await response.json();

            const selectAdd = document.getElementById('favorite_genre_id');
            const selectEdit = document.getElementById('edit_favorite_genre_id');

            if (response.ok && data.genres) {
                const options = '<option value="">请选择</option>' +
                    data.genres.map(genre => `
                        <option value="${genre.genre_id}">${genre.genre_name}</option>
                    `).join('');

                selectAdd.innerHTML = options;
                selectEdit.innerHTML = options;
            }
        } catch (error) {
            console.error('加载类型选项失败:', error);
        }
    }

    // 添加用户
    async function saveUser() {
        const form = document.getElementById('addUserForm');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // 验证必需字段
        if (!data.username || !data.password) {
            showAlert('用户名和密码不能为空', 'danger');
            return;
        }

        // 处理空值
        if (!data.age) delete data.age;
        if (!data.gender) delete data.gender;
        if (!data.favorite_genre_id) delete data.favorite_genre_id;
        if (!data.nickname) delete data.nickname;

        try {
            const response = await fetch('/api/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                showAlert('用户添加成功', 'success');
                // 关闭模态框
                const modal = bootstrap.Modal.getInstance(document.getElementById('addUserModal'));
                modal.hide();
                form.reset();
                loadUsers();
            } else {
                showAlert(result.error || result.message || '添加失败', 'danger');
            }
        } catch (error) {
            console.error('添加用户失败:', error);
            showAlert('添加失败: ' + error.message, 'danger');
        }
    }

    // 编辑用户
    async function editUser(userId) {
        try {
            const response = await fetch(`/api/users/${userId}`);

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();

            if (data) {
                document.getElementById('edit_user_id').value = data.user_id;
                document.getElementById('edit_username').value = data.username;
                document.getElementById('edit_nickname').value = data.nickname || '';
                document.getElementById('edit_age').value = data.age || '';
                document.getElementById('edit_gender').value = data.gender || '';
                document.getElementById('edit_favorite_genre_id').value = data.favorite_genre_id || '';

                // 显示编辑模态框
                const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
                modal.show();
            } else {
                showAlert('加载用户信息失败', 'danger');
            }
        } catch (error) {
            console.error('加载用户信息失败:', error);
            showAlert('加载用户信息失败: ' + error.message, 'danger');
        }
    }

    // 更新用户
    async function updateUser() {
        const userId = document.getElementById('edit_user_id').value;
        const form = document.getElementById('editUserForm');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // 如果密码为空，则删除该字段，不更新密码
        if (!data.password) delete data.password;
        // 处理空值
        if (!data.age) delete data.age;
        if (!data.gender) delete data.gender;
        if (!data.favorite_genre_id) delete data.favorite_genre_id;
        if (!data.nickname) delete data.nickname;

        try {
            const response = await fetch(`/api/users/${userId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                showAlert('用户更新成功', 'success');
                // 关闭模态框
                const modal = bootstrap.Modal.getInstance(document.getElementById('editUserModal'));
                modal.hide();
                loadUsers();
            } else {
                showAlert(result.error || result.message || '更新失败', 'danger');
            }
        } catch (error) {
            console.error('更新用户失败:', error);
            showAlert('更新失败: ' + error.message, 'danger');
        }
    }

    // 删除用户
    async function deleteUser(userId) {
        if (confirm('确定要删除这个用户吗？此操作不可撤销。')) {
            try {
                const response = await fetch(`/api/users/${userId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert('用户删除成功', 'success');
                    loadUsers();
                } else {
                    const result = await response.json();
                    showAlert(result.error || '删除失败', 'danger');
                }
            } catch (error) {
                console.error('删除用户失败:', error);
                showAlert('删除失败: ' + error.message, 'danger');
            }
        }
    }

    // 将函数暴露到全局作用域，供HTML中的onclick调用
    window.userManagement = {
        changePage,
        editUser,
        deleteUser
    };
})();
</script>
{% endblock %}
